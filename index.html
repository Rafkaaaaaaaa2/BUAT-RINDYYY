<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Favorite Person</title>
    <style>
        :root {
            --pink: #ff85a1;
            --dark-pink: #ff4d6d;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #ffe5ec;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            text-align: center;
        }

        .container {
            z-index: 10;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            max-width: 400px;
        }

        h1 { color: var(--dark-pink); }
        p { color: #666; font-size: 1.1rem; }

        .btn-group {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        button {
            padding: 12px 25px;
            font-size: 1rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
        }

        #btnYes {
            background-color: var(--pink);
            color: white;
        }

        #btnNo {
            background-color: #ccc;
            color: white;
            position: relative;
        }

        .heart {
            position: fixed;
            top: -10px;
            font-size: 20px;
            user-select: none;
            z-index: 1;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(100vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="container" id="mainCard">
        <div id="content">
            <h1 id="headline">Hai Cantik! ❤️</h1>
            <p id="message">Gabut ya? Tapi aku mau tanya serius... <br> Kamu sayang aku nggak?</p>
            
            <div class="btn-group">
                <button id="btnYes" onclick="celebrate()">Sayang Banget!</button>
                <button id="btnNo" onmouseover="moveButton()">Nggak!</button>
            </div>
        </div>
    </div>

    <script>
        // Fungsi buat mindahin tombol "Nggak" pas dideketin
        function moveButton() {
            const btnNo = document.getElementById('btnNo');
            const x = Math.random() * (window.innerWidth - btnNo.offsetWidth);
            const y = Math.random() * (window.innerHeight - btnNo.offsetHeight);
            
            btnNo.style.position = 'fixed';
            btnNo.style.left = x + 'px';
            btnNo.style.top = y + 'px';
        }

        // Fungsi pas tombol "Ya" diklik
        function celebrate() {
            const headline = document.getElementById('headline');
            const message = document.getElementById('message');
            const btnGroup = document.querySelector('.btn-group');

            headline.innerText = "I Knew It! 🥰";
            message.innerHTML = "Makasih ya udah sayang sama aku. <br> I love you more than CSS styles! ❤️";
            btnGroup.style.display = "none";

            // Mulai hujan hati
            setInterval(createHeart, 300);
        }

        // Fungsi bikin efek hati jatuh
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerText = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 2 + 3 + 's';
            heart.style.opacity = Math.random();
            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 5000);
        }
    </script>
</body>
</html>
